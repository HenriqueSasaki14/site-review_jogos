<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Rainbow Six — Review (amarelo.html)</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
</head>

<body>
    <div class="container">
        <header class="topbar">
            <div class="brand">
                <span>🟡 Rainbow Six Siege</span>
            </div>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="vermelho.html">Valorant</a>
                <a href="azul.html">Fortnite</a>
                <a href="amarelo.html">Rainbow Six</a>
                <a href="verde.html">Perfil</a>
            </nav>
        </header>

        <section class="section" id="gameRoot">
            <img class="banner" src="assets/r6.jpg" alt="Banner Rainbow Six Siege">
            <div class="title" style="margin-bottom:8px;">
                <div>
                    <div class="game-title">
                        <img class="game-logo" src="assets/r6logo.jpg" alt="Logo Rainbow Six Siege">
                        <h2 id="gameName" style="margin:0;">Rainbow Six Siege</h2>
                    </div>
                    <div class="small">Gênero: <span id="gameGenre"></span></div>
                </div>
                <div class="kpi">
                    <span class="pill">Nota: <b id="gameNote"></b></span>
                </div>
            </div>

            <p id="gameSummary"></p>

            <div class="actions" style="margin-top:10px;">
                <div id="followSlot"></div>
                <a class="btn" href="index.html">← Voltar</a>
            </div>

            <h3>Próximos campeonatos importantes</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>Campeonato</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="tournamentsBody"></tbody>
            </table>

            <h3>Fontes usadas (referência)</h3>
            <ul id="sourcesList"></ul>
        </section>

        <footer class="footer">
            <div class="hr"></div>
            <div>Datas de SI 2026 e EWC 2026 são referências públicas do cenário.</div>
        </footer>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => initGamePage("r6"));
    </script>
</body>

</html>
